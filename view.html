<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RMT SafeDocs - Viewer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="viewer-wrap">
    <section class="card viewer-card">
      <h2 id="docTitle">Loading document...</h2>
      <p id="docMeta" class="muted"></p>
      <iframe id="pdfViewer" class="pdf-frame" title="PDF Viewer"></iframe>
      <a id="downloadLink" target="_blank">Download PDF</a>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
